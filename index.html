<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Deyoung Portfolio</title>
    <meta http-equiv="refresh" content="0; url=https://deyoung-portfolio-backend.ct.ws">
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #0A1128;
            color: white;
            margin: 0;
        }
        a {
            color: #0EA5E9;
        }
        .container {
            text-align: center;
        }
        .loader {
            border: 3px solid rgba(14,165,233,0.3);
            border-top: 3px solid #0EA5E9;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="loader"></div>
        <p>Redirecting to <a href="https://deyoung-portfolio-backend.ct.ws">deyoung-portfolio-backend.ct.ws</a>...</p>
    </div>
</body>
</html>
